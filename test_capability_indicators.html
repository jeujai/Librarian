<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capability Indicators Test</title>
    <link rel="stylesheet" href="src/multimodal_librarian/static/css/quality-indicators.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 2rem;
            background: #f8fafc;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header-left {
            margin-bottom: 2rem;
        }
        .chat-container {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Capability-Specific Loading Indicators Test</h1>
        
        <!-- Header with quality indicator -->
        <div class="header-left">
            <h2>Quality Indicator</h2>
        </div>
        
        <!-- Chat container for status bar -->
        <div class="chat-container">
            <h2>Status Bar</h2>
        </div>
        
        <!-- Messages container -->
        <div id="chatMessages">
            <h2>Capability Status Panel</h2>
        </div>
        
        <!-- Input container -->
        <div class="chat-input-container" style="position: relative; margin-top: 2rem;">
            <h2>Loading Message</h2>
            <input type="text" placeholder="Type a message to see contextual guidance..." style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
        </div>
        
        <!-- Test buttons -->
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button onclick="testBasicMode()" style="padding: 0.5rem 1rem; background: #f59e0b; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">Test Basic Mode</button>
            <button onclick="testEnhancedMode()" style="padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">Test Enhanced Mode</button>
            <button onclick="testFullMode()" style="padding: 0.5rem 1rem; background: #10b981; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">Test Full Mode</button>
        </div>
    </div>

    <script src="src/multimodal_librarian/static/js/loading-states.js"></script>
    <script src="src/multimodal_librarian/static/js/expectation-manager.js"></script>
    
    <script>
        // Mock API responses for testing
        let mockCapabilityData = {
            basic: {
                available: [
                    { name: 'health_check', description: 'System health monitoring', indicator: '⚡' },
                    { name: 'simple_text', description: 'Basic text processing', indicator: '⚡' }
                ],
                loading: [
                    { name: 'basic_chat', description: 'Basic conversational AI', indicator: '🔄', eta_seconds: 45 }
                ]
            },
            enhanced: {
                available: [],
                loading: [
                    { name: 'simple_search', description: 'Basic search functionality', indicator: '🔄', eta_seconds: 90 },
                    { name: 'document_upload', description: 'Document upload capability', indicator: '🔄', eta_seconds: 120 }
                ]
            },
            full: {
                available: [],
                loading: [
                    { name: 'advanced_chat', description: 'Advanced AI chat', indicator: '🧠', eta_seconds: 180 },
                    { name: 'document_analysis', description: 'Document analysis', indicator: '🧠', eta_seconds: 240 }
                ]
            },
            overall: {
                total_capabilities: 6,
                available_capabilities: 2,
                readiness_percent: 33,
                current_level: 'basic'
            }
        };
        
        let mockProgressData = {
            overall_progress: 33,
            estimated_completion: new Date(Date.now() + 180000).toISOString()
        };
        
        // Mock fetch function
        window.fetch = function(url) {
            return Promise.resolve({
                ok: true,
                json: function() {
                    if (url.includes('capabilities')) {
                        return Promise.resolve(mockCapabilityData);
                    } else if (url.includes('progress')) {
                        return Promise.resolve(mockProgressData);
                    }
                    return Promise.resolve({});
                }
            });
        };
        
        // Test functions
        function testBasicMode() {
            mockCapabilityData.overall.current_level = 'basic';
            mockCapabilityData.overall.readiness_percent = 25;
            mockProgressData.overall_progress = 25;
            
            if (window.loadingStatesManager) {
                window.loadingStatesManager.updateCapabilities();
            }
        }
        
        function testEnhancedMode() {
            mockCapabilityData.basic.available.push(
                { name: 'basic_chat', description: 'Basic conversational AI', indicator: '🔄' }
            );
            mockCapabilityData.basic.loading = [];
            mockCapabilityData.enhanced.available.push(
                { name: 'simple_search', description: 'Basic search functionality', indicator: '🔄' }
            );
            mockCapabilityData.overall.current_level = 'enhanced';
            mockCapabilityData.overall.readiness_percent = 60;
            mockCapabilityData.overall.available_capabilities = 4;
            mockProgressData.overall_progress = 60;
            
            if (window.loadingStatesManager) {
                window.loadingStatesManager.updateCapabilities();
            }
        }
        
        function testFullMode() {
            mockCapabilityData.enhanced.available.push(
                { name: 'document_upload', description: 'Document upload capability', indicator: '🔄' }
            );
            mockCapabilityData.enhanced.loading = [];
            mockCapabilityData.full.available = [
                { name: 'advanced_chat', description: 'Advanced AI chat', indicator: '🧠' },
                { name: 'document_analysis', description: 'Document analysis', indicator: '🧠' }
            ];
            mockCapabilityData.full.loading = [];
            mockCapabilityData.overall.current_level = 'full';
            mockCapabilityData.overall.readiness_percent = 100;
            mockCapabilityData.overall.available_capabilities = 6;
            mockProgressData.overall_progress = 100;
            
            if (window.loadingStatesManager) {
                window.loadingStatesManager.updateCapabilities();
            }
        }
        
        // Initialize after page load
        setTimeout(() => {
            console.log('Test page loaded, capability indicators should be visible');
        }, 1000);
    </script>
</body>
</html>
