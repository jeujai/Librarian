# PostgreSQL Configuration for Multimodal Librarian Local Development
# This configuration is optimized for local development with reasonable resource usage

# =============================================================================
# CONNECTIONS AND AUTHENTICATION
# =============================================================================

# Connection settings
max_connections = 100
superuser_reserved_connections = 3

# Authentication
authentication_timeout = 1min
password_encryption = scram-sha-256

# SSL (disabled for local development)
ssl = off

# =============================================================================
# RESOURCE USAGE (MEMORY)
# =============================================================================

# Memory settings optimized for local development (targeting ~1GB total usage)
# Based on NFR-1: Memory usage < 8GB total for all services
shared_buffers = 256MB                    # Main buffer pool - 25% of allocated memory
huge_pages = try                          # Try to use huge pages if available
temp_buffers = 8MB                        # Temporary buffer size per session
work_mem = 8MB                           # Memory for sorts and hash tables (increased for better performance)
maintenance_work_mem = 128MB             # Memory for maintenance operations (increased for faster VACUUM/ANALYZE)
autovacuum_work_mem = 64MB               # Separate memory for autovacuum to avoid blocking
max_stack_depth = 2MB                    # Maximum stack depth

# Shared memory settings
dynamic_shared_memory_type = posix       # Use POSIX shared memory

# =============================================================================
# RESOURCE USAGE (DISK)
# =============================================================================

# Temporary file settings
temp_file_limit = -1                     # No limit on temp files

# =============================================================================
# WRITE-AHEAD LOGGING
# =============================================================================

# WAL settings optimized for development (balance performance and safety)
wal_level = replica                      # Minimal WAL for replication
fsync = on                              # Keep fsync on for data safety
synchronous_commit = on                 # Keep synchronous commits for consistency
wal_sync_method = fsync                 # Use fsync for WAL
full_page_writes = on                   # Write full pages after checkpoint
wal_compression = on                    # Compress WAL records to save space
wal_buffers = 32MB                      # Increased WAL buffer size for better performance
wal_writer_delay = 200ms                # WAL writer delay
commit_delay = 0                        # No commit delay
commit_siblings = 5                     # Commit siblings threshold

# Checkpoints optimized for development
checkpoint_timeout = 10min              # Longer checkpoint timeout for development
checkpoint_completion_target = 0.9      # Checkpoint completion target
checkpoint_flush_after = 256kB          # Flush after this much data
checkpoint_warning = 30s                # Warn if checkpoints are too frequent
max_wal_size = 2GB                      # Maximum WAL size before checkpoint
min_wal_size = 512MB                    # Minimum WAL size

# Archiving (disabled for local development)
archive_mode = off

# =============================================================================
# REPLICATION
# =============================================================================

# Replication settings (minimal for local development)
max_wal_senders = 10
max_replication_slots = 10
track_commit_timestamp = off

# =============================================================================
# QUERY TUNING
# =============================================================================

# Planner settings
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_parallel_append = on
enable_parallel_hash = on
enable_partition_pruning = on
enable_partitionwise_join = off
enable_partitionwise_aggregate = off
enable_seqscan = on
enable_sort = on
enable_tidscan = on

# Planner cost constants optimized for development workloads
seq_page_cost = 1.0                     # Sequential page cost
random_page_cost = 2.0                  # Reduced from 4.0 for SSD storage (common in development)
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB
effective_cache_size = 1GB              # Estimate of OS cache size

# Parallel query settings for development
max_parallel_workers_per_gather = 2     # Limit parallel workers for development
max_parallel_maintenance_workers = 2    # Limit maintenance parallel workers
max_parallel_workers = 4                # Total parallel workers limit

# =============================================================================
# REPORTING AND LOGGING
# =============================================================================

# Logging settings optimized for development
log_destination = 'stderr'
logging_collector = off
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = off
log_rotation_age = 1d
log_rotation_size = 10MB
syslog_facility = 'LOCAL0'
syslog_ident = 'postgres'
syslog_sequence_numbers = on
syslog_split_messages = on

# When to log (optimized for development debugging)
log_min_messages = notice
log_min_error_statement = error
log_min_duration_statement = 2000       # Log queries taking longer than 2s (development threshold)

# What to log (enhanced for development)
debug_print_parse = off
debug_print_rewritten = off
debug_print_plan = off
debug_pretty_print = on
log_checkpoints = on
log_connections = off                    # Disable for less noise in development
log_disconnections = off
log_duration = off
log_error_verbosity = default
log_hostname = off
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on                     # Important for development debugging
log_statement = 'none'                  # Don't log all statements in development
log_replication_commands = off
log_temp_files = 50MB                   # Log temp files larger than 50MB (increased threshold)
log_timezone = 'UTC'

# Additional logging for development
log_autovacuum_min_duration = 5000      # Log slow autovacuum operations
log_statement_stats = off               # Disable for performance
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off

# =============================================================================
# PROCESS TITLE
# =============================================================================

cluster_name = 'multimodal_librarian_local'
update_process_title = on

# =============================================================================
# STATISTICS
# =============================================================================

# Statistics settings
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl                     # Track PL/pgSQL functions
# stats_temp_directory removed in PostgreSQL 15

# =============================================================================
# AUTOVACUUM
# =============================================================================

# Autovacuum settings optimized for development workloads
autovacuum = on
log_autovacuum_min_duration = 5000      # Log autovacuum operations > 5s (reduced noise)
autovacuum_max_workers = 2              # Reduced workers for development
autovacuum_naptime = 30s                # More frequent autovacuum for development
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_insert_threshold = 1000
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1    # More aggressive vacuuming for development
autovacuum_vacuum_insert_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05  # More frequent analyze for better stats
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 10ms     # Slightly higher delay to reduce I/O impact
autovacuum_vacuum_cost_limit = 200      # Lower cost limit for development

# =============================================================================
# CLIENT CONNECTION DEFAULTS
# =============================================================================

# Statement behavior
search_path = '"$user", public'
row_security = on
default_tablespace = ''
temp_tablespaces = ''
default_table_access_method = 'heap'
check_function_bodies = on
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
session_replication_role = 'origin'
statement_timeout = 0                   # No statement timeout in development
lock_timeout = 0                        # No lock timeout in development
idle_in_transaction_session_timeout = 0 # No idle timeout in development
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
# vacuum_cleanup_index_scale_factor removed in PostgreSQL 14
bytea_output = 'hex'
xmlbinary = 'base64'
xmloption = 'content'
gin_fuzzy_search_limit = 0
gin_pending_list_limit = 4MB

# Locale and formatting
datestyle = 'iso, mdy'
intervalstyle = 'postgres'
timezone = 'UTC'
timezone_abbreviations = 'Default'
extra_float_digits = 1
client_encoding = sql_ascii

# Shared library preloading
shared_preload_libraries = 'pg_stat_statements'
local_preload_libraries = ''
session_preload_libraries = ''

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================

deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
max_pred_locks_per_relation = -2
max_pred_locks_per_page = 2

# =============================================================================
# VERSION AND PLATFORM COMPATIBILITY
# =============================================================================

array_nulls = on
backslash_quote = safe_encoding
escape_string_warning = on
lo_compat_privileges = off
# operator_precedence_warning removed in PostgreSQL 14
quote_all_identifiers = off
standard_conforming_strings = on
synchronize_seqscans = on
transform_null_equals = off

# =============================================================================
# ERROR HANDLING
# =============================================================================

exit_on_error = off
restart_after_crash = on
data_sync_retry = off

# =============================================================================
# CONFIG FILE INCLUDES
# =============================================================================

# Include files (none for local development)
# include_dir = ''
# include_if_exists = ''
# include = ''

# =============================================================================
# CUSTOMIZED OPTIONS
# =============================================================================

# Custom variable classes
# custom_variable_classes = ''

# Development-specific settings
log_statement_stats = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off

# JIT compilation (disable for development to reduce complexity)
jit = off