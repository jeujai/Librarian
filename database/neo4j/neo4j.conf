# Neo4j Configuration for Local Development
# This file contains the configuration for Neo4j Community Edition
# with APOC and GDS plugins for local development
# Optimized for performance within memory constraints

#*****************************************************************
# Network connector configuration
#*****************************************************************

# Bolt connector
server.bolt.enabled=true
server.bolt.listen_address=0.0.0.0:7687

# HTTP Connector
server.http.enabled=true
server.http.listen_address=0.0.0.0:7474

# HTTPS Connector (disabled for local development)
server.https.enabled=false

#*****************************************************************
# Memory Settings (optimized for local development)
# Target: ~1GB total memory usage
#*****************************************************************

# Initial heap size (start smaller for faster startup)
server.memory.heap.initial_size=512m

# Maximum heap size (limit to 1GB for development)
server.memory.heap.max_size=1G

# Page cache size (optimized for development workloads)
server.memory.pagecache.size=512m

# Off-heap memory limit
server.memory.off_heap.max_size=256m

#*****************************************************************
# Performance Tuning for Development
#*****************************************************************

# Transaction log settings (optimized for development)
db.tx_log.rotation.retention_policy=1G size
db.tx_log.rotation.size=100M

# Query cache settings
dbms.query_cache_size=1000

# Cypher runtime optimization
cypher.default_language_version=5
cypher.lenient_create_relationship=true

# Connection pool settings
server.bolt.connection_keep_alive=true
server.bolt.connection_keep_alive_for_request_timeout=10m
server.bolt.thread_pool_min_size=5
server.bolt.thread_pool_max_size=400

# Database checkpoint settings (optimized for development)
db.checkpoint.interval.time=5m
db.checkpoint.interval.tx=10000

# Index settings for better query performance
db.index_sampling.background_enabled=true
db.index_sampling.sample_size_limit=1000000

#*****************************************************************
# Security Configuration
#*****************************************************************

# Authentication and authorization
dbms.security.auth_enabled=true

# Procedures security configuration
dbms.security.procedures.unrestricted=gds.*,apoc.*
dbms.security.procedures.allowlist=gds.*,apoc.*

# Allow CSV import from file URLs (for APOC)
dbms.security.allow_csv_import_from_file_urls=true

#*****************************************************************
# Plugin Configuration
#*****************************************************************

# Enable plugins directory
dbms.directories.plugins=/plugins

# APOC configuration
apoc.export.file.enabled=true
apoc.import.file.enabled=true
apoc.import.file.use_neo4j_config=true

# GDS configuration
gds.enterprise.license_file=

#*****************************************************************
# Database Configuration
#*****************************************************************

# Default database
initial.dbms.default_database=neo4j

# Allow database upgrades
dbms.allow_upgrade=true

# Allow format migration for development
dbms.allow_format_migration=true

#*****************************************************************
# Logging Configuration (optimized for development)
#*****************************************************************

# Log level
dbms.logs.default_level=INFO

# Query logging (disabled for development performance)
dbms.logs.query.enabled=false

# Disable GC logging for performance
dbms.logs.gc.enabled=false

#*****************************************************************
# Development-specific Performance Optimizations
#*****************************************************************

# Disable usage data collection
dbms.usage_report.enabled=false

# Timeout settings for development
dbms.transaction.timeout=60s
dbms.lock.acquisition.timeout=60s

# Relationship grouping threshold (optimized for development)
unsupported.dbms.block_size.array_properties=120
unsupported.dbms.block_size.strings=120

# Enable parallel runtime for better query performance
cypher.runtime=parallel

# Optimize for development workloads
dbms.memory.transaction.global_max_size=512m
dbms.memory.transaction.database_max_size=256m

#*****************************************************************
# Backup Configuration (for local development)
#*****************************************************************

# Enable online backup
dbms.backup.enabled=true
dbms.backup.listen_address=0.0.0.0:6362

#*****************************************************************
# Metrics and Monitoring (lightweight for development)
#*****************************************************************

# Enable metrics but keep lightweight
metrics.enabled=true
metrics.csv.enabled=false
metrics.graphite.enabled=false
metrics.jmx.enabled=true

# Disable expensive metrics for development
metrics.neo4j.enabled=true
metrics.neo4j.tx.enabled=false
metrics.neo4j.pagecache.enabled=false

#*****************************************************************
# Startup Optimization
#*****************************************************************

# Faster startup settings
dbms.recovery.fail_on_missing_files=false
dbms.recovery.fail_on_corrupted_log_files=false

# Reduce startup validation for development
dbms.store.files.preallocate=false

#*****************************************************************
# Query Performance Optimization
#*****************************************************************

# Enable query plan caching
cypher.query_plan_cache_size=1000

# Optimize for development query patterns
cypher.statistics_divergence_threshold=0.75
cypher.replan_interval=10s

# Enable cost-based optimization
cypher.planner=cost
cypher.runtime=parallel

#*****************************************************************
# Connection and Threading Optimization
#*****************************************************************

# Optimize thread pools for development
server.threads.worker_count=4
server.threads.processing_queue_size=1000

# Connection timeout settings
server.bolt.connection_timeout=30s
server.bolt.negotiation_timeout=30s
server.default_listen_address=0.0.0.0
