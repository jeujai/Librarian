version: '3.8'

# Testing docker-compose override
services:
  app:
    build:
      context: .
      target: development
    environment:
      # Test settings
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - API_WORKERS=1
      - REQUIRE_AUTH=false
      - RATE_LIMIT_PER_MINUTE=1000
      
      # Test database settings
      - POSTGRES_DB=multimodal_librarian_test
      - MILVUS_COLLECTION_NAME=knowledge_chunks_test
      
      # Disable external APIs for testing
      - OPENAI_API_KEY=test-key
      - GOOGLE_API_KEY=test-key
      - GEMINI_API_KEY=test-key
    volumes:
      # Mount test directories
      - ./test_uploads:/app/uploads
      - ./test_media:/app/media
      - ./test_exports:/app/exports
      - ./logs:/app/logs
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["python", "-m", "pytest", "-v", "--tb=short"]
    depends_on:
      postgres-test:
        condition: service_healthy
      milvus-test:
        condition: service_started

  postgres-test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=multimodal_librarian_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multimodal_librarian_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  milvus-test:
    image: milvusdb/milvus:v2.3.4
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd-test:2379
      - MINIO_ADDRESS=minio-test:9000
    volumes:
      - milvus_test_data:/var/lib/milvus
    ports:
      - "19531:19530"
    depends_on:
      - etcd-test
      - minio-test
    networks:
      - app-network

  etcd-test:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=1073741824  # 1GB for testing
    volumes:
      - etcd_test_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - app-network

  minio-test:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_test_data:/data
    command: minio server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - app-network

volumes:
  postgres_test_data:
  milvus_test_data:
  etcd_test_data:
  minio_test_data: