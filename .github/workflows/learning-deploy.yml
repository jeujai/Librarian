name: Learning Deployment

on:
  # Manual trigger for learning purposes
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'learning'
        type: choice
        options:
          - learning
      deploy_to_ecs:
        description: 'Deploy to ECS after building image'
        required: false
        default: false
        type: boolean

  # Trigger on push to main branch (optional)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile.learning'
      - 'requirements*.txt'
      - 'pyproject.toml'

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: multimodal-librarian
  ENVIRONMENT: learning

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    # Only run if this is a manual dispatch or push to main
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.build.outputs.image-tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # These should be configured as GitHub repository secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: $ACCOUNT_ID"
      
      - name: Build, tag, and push image to Amazon ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
        run: |
          # Generate image tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="manual-$(date +%Y%m%d-%H%M%S)"
          else
            IMAGE_TAG="${GITHUB_SHA:0:8}"
          fi
          
          echo "Building image with tag: $IMAGE_TAG"
          
          # Build image
          docker build -f Dockerfile.learning -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Push image
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Output image details
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          
          echo "✅ Image pushed successfully:"
          echo "   URI: $IMAGE_URI"
          echo "   Latest: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
      
      - name: Run basic tests on built image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
          IMAGE_TAG: ${{ steps.build.outputs.image-tag }}
        run: |
          echo "🧪 Running basic container tests..."
          
          # Test that the container starts and responds to health check
          docker run --rm -d --name test-container -p 8080:8000 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Wait for container to start
          sleep 10
          
          # Test health endpoint (basic test)
          if curl -f http://localhost:8080/health; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed"
            docker logs test-container
            exit 1
          fi
          
          # Clean up
          docker stop test-container
          
          echo "✅ Basic container tests passed"
      
      - name: Scan image for vulnerabilities
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
          IMAGE_TAG: ${{ steps.build.outputs.image-tag }}
        run: |
          echo "🔍 Scanning image for vulnerabilities..."
          
          # Wait for ECR scan to complete (it's triggered automatically)
          sleep 30
          
          # Get scan results
          SCAN_STATUS=$(aws ecr describe-image-scan-findings \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=$IMAGE_TAG \
            --query 'imageScanStatus.status' \
            --output text 2>/dev/null || echo "IN_PROGRESS")
          
          echo "Scan status: $SCAN_STATUS"
          
          if [ "$SCAN_STATUS" = "COMPLETE" ]; then
            # Get vulnerability counts
            HIGH_COUNT=$(aws ecr describe-image-scan-findings \
              --repository-name $ECR_REPOSITORY \
              --image-id imageTag=$IMAGE_TAG \
              --query 'imageScanFindings.findingCounts.HIGH' \
              --output text 2>/dev/null || echo "0")
            
            CRITICAL_COUNT=$(aws ecr describe-image-scan-findings \
              --repository-name $ECR_REPOSITORY \
              --image-id imageTag=$IMAGE_TAG \
              --query 'imageScanFindings.findingCounts.CRITICAL' \
              --output text 2>/dev/null || echo "0")
            
            echo "🔍 Vulnerability scan results:"
            echo "   Critical: $CRITICAL_COUNT"
            echo "   High: $HIGH_COUNT"
            
            # For learning, we'll just warn about critical vulnerabilities
            if [ "$CRITICAL_COUNT" != "0" ] && [ "$CRITICAL_COUNT" != "None" ]; then
              echo "⚠️  Warning: $CRITICAL_COUNT critical vulnerabilities found"
              echo "   This is a learning environment, so we'll continue"
              echo "   In production, you should fix these before deploying"
            else
              echo "✅ No critical vulnerabilities found"
            fi
          else
            echo "ℹ️  Vulnerability scan still in progress or failed"
            echo "   This is normal for new images, scan results will be available later"
          fi

  # Optional ECS deployment job (for future use)
  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.deploy_to_ecs == 'true'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to ECS (placeholder)
        run: |
          echo "🚀 ECS deployment would happen here"
          echo "   Image: ${{ needs.build-and-push.outputs.image-uri }}"
          echo "   Tag: ${{ needs.build-and-push.outputs.image-tag }}"
          echo ""
          echo "📝 This will be implemented in Task 5: ECS Cluster Setup"
          echo "   For now, the image is built and ready in ECR"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    
    steps:
      - name: Print deployment summary
        run: |
          echo "🎉 Learning Deployment Summary"
          echo "=============================="
          echo ""
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "✅ Docker image built and pushed successfully"
            echo "   Image URI: ${{ needs.build-and-push.outputs.image-uri }}"
            echo "   Image Tag: ${{ needs.build-and-push.outputs.image-tag }}"
            echo ""
            echo "📝 Next Steps:"
            echo "1. Image is available in ECR for ECS deployment"
            echo "2. Run Task 5 to set up ECS cluster"
            echo "3. Deploy the application to ECS Fargate"
          else
            echo "❌ Build failed"
            echo "   Check the build logs for details"
          fi
          echo ""
          echo "💰 Cost Impact:"
          echo "- ECR storage: ~$0.10/GB/month"
          echo "- GitHub Actions: Free for public repos"
          echo "- Image scanning: Free tier (1000 scans/month)"