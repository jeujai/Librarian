name: Learning CI/CD Pipeline

on:
  # Manual trigger for learning purposes
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'learning'
        type: choice
        options:
          - learning
          - dev
      run_tests:
        description: 'Run full test suite'
        required: false
        default: true
        type: boolean
      deploy_infrastructure:
        description: 'Deploy infrastructure changes'
        required: false
        default: false
        type: boolean
      deploy_application:
        description: 'Deploy application to ECS'
        required: false
        default: false
        type: boolean

  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infrastructure/**'
      - 'tests/**'
      - 'Dockerfile*'
      - 'requirements*.txt'
      - 'pyproject.toml'

  # Trigger on pull requests
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infrastructure/**'
      - 'tests/**'
      - 'Dockerfile*'
      - 'requirements*.txt'
      - 'pyproject.toml'

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: multimodal-librarian
  ENVIRONMENT: learning
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.run_tests != 'false'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-core.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Set up test environment
        run: |
          # Create test environment file
          cat > .env.test << EOF
          DATABASE_URL=postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL=redis://localhost:6379/0
          ENVIRONMENT=test
          SECRET_KEY=test-secret-key-for-ci
          GEMINI_API_KEY=test-key
          OPENAI_API_KEY=test-key
          GOOGLE_API_KEY=test-key
          EOF
      
      - name: Run basic tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          echo "🧪 Running basic test suite..."
          
          # Run core component tests
          python -m pytest tests/components/ -v --tb=short
          
          # Run API tests (simplified for CI)
          python -m pytest tests/ -k "not test_ml_training" -v --tb=short
          
          echo "✅ Basic tests completed"
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          echo "🔗 Running integration tests..."
          
          # Initialize test database
          python -c "
          from src.multimodal_librarian.database.init_db import init_database
          init_database()
          "
          
          # Run integration test
          python integration_test.py
          
          echo "✅ Integration tests completed"
      
      - name: Generate test report
        run: |
          echo "📊 Test Summary" > test-report.txt
          echo "===============" >> test-report.txt
          echo "✅ Basic component tests: PASSED" >> test-report.txt
          echo "✅ API tests: PASSED" >> test-report.txt
          echo "✅ Integration tests: PASSED" >> test-report.txt
          echo "📅 Test run: $(date)" >> test-report.txt
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-report.txt

  # Job 2: Build and push Docker image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.build.outputs.image-tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
        run: |
          # Generate image tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="manual-$(date +%Y%m%d-%H%M%S)"
          else
            IMAGE_TAG="${GITHUB_SHA:0:8}"
          fi
          
          echo "🐳 Building image with tag: $IMAGE_TAG"
          
          # Build image using learning Dockerfile
          docker build -f Dockerfile.learning -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Push image
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Output image details
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          
          echo "✅ Image pushed successfully: $IMAGE_URI"
      
      - name: Run container security scan
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
          IMAGE_TAG: ${{ steps.build.outputs.image-tag }}
        run: |
          echo "🔍 Running basic security scan..."
          
          # Wait for ECR scan to complete
          sleep 30
          
          # Get scan results
          SCAN_STATUS=$(aws ecr describe-image-scan-findings \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=$IMAGE_TAG \
            --query 'imageScanStatus.status' \
            --output text 2>/dev/null || echo "IN_PROGRESS")
          
          echo "Scan status: $SCAN_STATUS"
          
          if [ "$SCAN_STATUS" = "COMPLETE" ]; then
            CRITICAL_COUNT=$(aws ecr describe-image-scan-findings \
              --repository-name $ECR_REPOSITORY \
              --image-id imageTag=$IMAGE_TAG \
              --query 'imageScanFindings.findingCounts.CRITICAL' \
              --output text 2>/dev/null || echo "0")
            
            echo "🔍 Critical vulnerabilities: $CRITICAL_COUNT"
            
            if [ "$CRITICAL_COUNT" != "0" ] && [ "$CRITICAL_COUNT" != "None" ]; then
              echo "⚠️  Warning: $CRITICAL_COUNT critical vulnerabilities found"
            else
              echo "✅ No critical vulnerabilities found"
            fi
          else
            echo "ℹ️  Security scan in progress"
          fi

  # Job 3: Deploy infrastructure (optional)
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event.inputs.deploy_infrastructure == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: infrastructure/learning/package-lock.json
      
      - name: Install CDK dependencies
        working-directory: infrastructure/learning
        run: |
          npm ci
          npm install -g aws-cdk
      
      - name: Deploy infrastructure safely
        working-directory: infrastructure/learning
        run: |
          echo "🏗️  Deploying infrastructure with safety checks..."
          
          # Run CDK diff first
          echo "📋 Infrastructure changes:"
          cdk diff MultimodalLibrarianStack || true
          
          # Deploy with approval required
          cdk deploy MultimodalLibrarianStack \
            --require-approval=any-change \
            --rollback=true \
            --region ${{ env.AWS_REGION }}
          
          echo "✅ Infrastructure deployment completed"

  # Job 4: Deploy application
  deploy-application:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event.inputs.deploy_application == 'true' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to ECS
        env:
          IMAGE_URI: ${{ needs.build.outputs.image-uri }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          echo "🚀 Deploying application to ECS..."
          echo "   Image: $IMAGE_URI"
          
          CLUSTER_NAME="${PROJECT_NAME}-${ENVIRONMENT}"
          
          # Check if cluster exists
          if ! aws ecs describe-clusters --clusters "$CLUSTER_NAME" --region ${{ env.AWS_REGION }} &> /dev/null; then
            echo "❌ ECS cluster $CLUSTER_NAME not found"
            echo "   Please deploy infrastructure first"
            exit 1
          fi
          
          # Get services
          SERVICES=$(aws ecs list-services \
            --cluster "$CLUSTER_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'serviceArns[*]' \
            --output text)
          
          if [ -z "$SERVICES" ]; then
            echo "❌ No ECS services found"
            echo "   Please deploy infrastructure first"
            exit 1
          fi
          
          # Update each service
          for SERVICE_ARN in $SERVICES; do
            SERVICE_NAME=$(basename "$SERVICE_ARN")
            echo "📦 Updating service: $SERVICE_NAME"
            
            # Force new deployment with latest image
            aws ecs update-service \
              --cluster "$CLUSTER_NAME" \
              --service "$SERVICE_NAME" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} > /dev/null
            
            echo "⏳ Waiting for deployment to stabilize..."
            aws ecs wait services-stable \
              --cluster "$CLUSTER_NAME" \
              --services "$SERVICE_NAME" \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ Service $SERVICE_NAME updated successfully"
          done
          
          echo "🎉 Application deployment completed"

  # Job 5: Post-deployment validation
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [deploy-application]
    if: always() && (needs.deploy-application.result == 'success' || needs.deploy-application.result == 'skipped')
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Validate deployment
        run: |
          echo "🔍 Validating deployment..."
          
          STACK_NAME="MultimodalLibrarianStack"
          
          # Check stack status
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          
          echo "📊 Stack status: $STACK_STATUS"
          
          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "⚠️  Stack not found - infrastructure may not be deployed"
            exit 0
          fi
          
          # Get load balancer URL
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$ALB_DNS" ]; then
            echo "🌐 Application URL: http://$ALB_DNS"
            
            # Test health endpoint
            echo "🏥 Testing health endpoint..."
            for i in {1..5}; do
              if curl -f -s "http://$ALB_DNS/health" > /dev/null; then
                echo "✅ Health check passed"
                break
              else
                echo "⏳ Health check attempt $i/5 failed, retrying..."
                sleep 10
              fi
            done
          else
            echo "⚠️  No load balancer found"
          fi
          
          # Check ECS service health
          CLUSTER_NAME="${PROJECT_NAME}-${ENVIRONMENT}"
          if aws ecs describe-clusters --clusters "$CLUSTER_NAME" --region ${{ env.AWS_REGION }} &> /dev/null; then
            RUNNING_TASKS=$(aws ecs list-tasks \
              --cluster "$CLUSTER_NAME" \
              --desired-status RUNNING \
              --region ${{ env.AWS_REGION }} \
              --query 'length(taskArns)')
            
            echo "🏃 Running ECS tasks: $RUNNING_TASKS"
            
            if [ "$RUNNING_TASKS" -gt 0 ]; then
              echo "✅ ECS services are running"
            else
              echo "⚠️  No running ECS tasks found"
            fi
          fi
          
          echo "🎯 Validation completed"

  # Job 6: Notification and summary
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [test, build, deploy-application, validate]
    if: always()
    
    steps:
      - name: Generate deployment summary
        run: |
          echo "📋 CI/CD Pipeline Summary" > summary.txt
          echo "=========================" >> summary.txt
          echo "" >> summary.txt
          echo "🕐 Pipeline run: $(date)" >> summary.txt
          echo "🌿 Branch: ${{ github.ref_name }}" >> summary.txt
          echo "📝 Commit: ${{ github.sha }}" >> summary.txt
          echo "👤 Triggered by: ${{ github.actor }}" >> summary.txt
          echo "" >> summary.txt
          
          # Job results
          echo "📊 Job Results:" >> summary.txt
          echo "  Tests: ${{ needs.test.result }}" >> summary.txt
          echo "  Build: ${{ needs.build.result }}" >> summary.txt
          echo "  Deploy: ${{ needs.deploy-application.result }}" >> summary.txt
          echo "  Validate: ${{ needs.validate.result }}" >> summary.txt
          echo "" >> summary.txt
          
          # Overall status
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.build.result }}" = "success" ]; then
            echo "🎉 Overall Status: SUCCESS" >> summary.txt
            echo "✅ All critical jobs completed successfully" >> summary.txt
          else
            echo "❌ Overall Status: FAILED" >> summary.txt
            echo "⚠️  One or more critical jobs failed" >> summary.txt
          fi
          
          echo "" >> summary.txt
          echo "🔗 View full details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> summary.txt
          
          cat summary.txt
      
      - name: Upload summary
        uses: actions/upload-artifact@v3
        with:
          name: deployment-summary
          path: summary.txt
      
      # In a real environment, you might send notifications to Slack, email, etc.
      - name: Log completion
        run: |
          echo "🏁 CI/CD pipeline completed"
          echo "📊 Check the summary artifact for detailed results"
          echo "💡 This is a learning-focused pipeline - customize for production use"