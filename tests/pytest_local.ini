# Pytest configuration for local service testing
# This file provides pytest configuration specifically for testing
# with local Docker Compose services

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --showlocals

# Markers for test categorization
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that require local services
    local_services: Tests that require Docker Compose services to be running
    aws_services: Tests that require AWS services (skipped in local development)
    slow: Tests that take a long time to run
    database: Tests that interact with databases
    network: Tests that require network connectivity
    postgres: Tests that require PostgreSQL
    neo4j: Tests that require Neo4j
    milvus: Tests that require Milvus
    redis: Tests that require Redis

# Async test configuration
asyncio_mode = auto

# Test timeout (5 minutes)
timeout = 300

# Minimum pytest version
minversion = 6.0

# Test environment variables
env =
    ML_ENVIRONMENT=test
    ML_DATABASE_TYPE=local
    DATABASE_TYPE=local
    DEBUG=true
    LOG_LEVEL=DEBUG
    VALIDATE_CONFIG_ON_STARTUP=false
    STRICT_CONFIG_VALIDATION=false
    POSTGRES_HOST=localhost
    POSTGRES_PORT=5432
    POSTGRES_DB=multimodal_librarian_test
    POSTGRES_USER=ml_user
    POSTGRES_PASSWORD=ml_password
    NEO4J_HOST=localhost
    NEO4J_PORT=7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=ml_password
    MILVUS_HOST=localhost
    MILVUS_PORT=19530
    MILVUS_COLLECTION_NAME=test_knowledge_chunks
    REDIS_HOST=localhost
    REDIS_PORT=6379
    REDIS_DB=1
    OPENAI_API_KEY=
    GOOGLE_API_KEY=
    ANTHROPIC_API_KEY=
    ENABLE_HEALTH_CHECKS=false
    CONNECTION_TIMEOUT=10
    QUERY_TIMEOUT=5
    MAX_RETRIES=1

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pymilvus.*
    ignore::UserWarning:neo4j.*

# Test collection configuration
collect_ignore = [
    "setup.py",
    "conftest.py",
]

# Pytest plugins
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    -ra
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=80

# Coverage configuration
[coverage:run]
source = src/multimodal_librarian
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod