[tool:pytest]
# Pytest configuration for Local Development Conversion testing

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Add options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --showlocals
    --durations=10
    --color=yes
    --code-highlight=yes

# Markers for test categorization
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that require external services
    local: Tests specific to local development environment
    aws: Tests specific to AWS environment
    docker: Tests that require Docker/Docker Compose
    slow: Tests that take a long time to run
    database: Tests that require database connections
    redis: Tests that require Redis
    milvus: Tests that require Milvus vector database
    neo4j: Tests that require Neo4j graph database
    postgres: Tests that require PostgreSQL
    client: Tests for database client implementations
    config: Tests for configuration management
    factory: Tests for factory pattern implementations
    switching: Tests for environment switching functionality
    performance: Performance and benchmark tests
    pbt: Property-based tests
    smoke: Basic smoke tests for quick validation
    health: Health check related tests
    api: API endpoint tests
    websocket: WebSocket functionality tests
    auth: Authentication and authorization tests
    security: Security-related tests
    mock: Tests that use mocked services
    real: Tests that use real services
    cleanup: Tests that verify cleanup functionality
    ci: Tests designed for CI/CD environments
    github_actions: Tests optimized for GitHub Actions
    local_services: Tests that require local services to be running
    aws_services: Tests that require AWS services
    docker_compose: Tests that use Docker Compose services
    standalone: Tests that use standalone services
    parallel: Tests that can run in parallel
    serial: Tests that must run serially

# Test timeout (in seconds)
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pymilvus.*
    ignore::UserWarning:neo4j.*
    ignore::UserWarning:asyncpg.*
    ignore::RuntimeWarning:asyncio.*

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(funcName)s(): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Coverage
# Note: Coverage configuration is in pyproject.toml

# Asyncio
asyncio_mode = auto

# Parallel execution
# Use with: pytest -n auto
# Requires pytest-xdist

# Environment variables for testing
env =
    ML_ENVIRONMENT = test
    DEBUG = true
    LOG_LEVEL = DEBUG
    PYTEST_CURRENT_TEST = true
    ENABLE_HEALTH_CHECKS = false
    VALIDATE_CONFIG_ON_STARTUP = false
    STRICT_CONFIG_VALIDATION = false