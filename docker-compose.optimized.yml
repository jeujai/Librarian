# Optimized Docker Compose for faster startup times
# Focus on parallel startup, optimized resource allocation, and faster health checks

services:
  # =============================================================================
  # MAIN APPLICATION SERVICE - Optimized for fast startup
  # =============================================================================
  multimodal-librarian:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: development
      cache_from:
        - multimodal-librarian:cache-builder
        - multimodal-librarian:base
        - multimodal-librarian:model-cache
    env_file:
      - .env.local
    ports:
      - "${API_PORT:-8000}:8000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1.5G  # Reduced from 2G for faster startup
        reservations:
          cpus: '0.5'
          memory: 384M  # Reduced from 512M
      restart_policy:
        condition: on-failure
        delay: 3s  # Reduced from 5s
        max_attempts: 3
        window: 60s  # Reduced from 120s
    environment:
      # Environment selection
      - ML_ENVIRONMENT=${ML_ENVIRONMENT:-local}
      - ML_DATABASE_TYPE=${ML_DATABASE_TYPE:-local}
      - DATABASE_TYPE=${DATABASE_TYPE:-local}
      
      # Development mode settings - optimized for startup
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}  # Changed from DEBUG for faster startup
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_WORKERS=${API_WORKERS:-1}
      
      # Application configuration
      - APP_NAME=${APP_NAME:-Multimodal Librarian}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      
      # Hot reload settings - optimized
      - PYTHONPATH=/app/src:/app
      - WATCHDOG_ENABLED=true
      - RELOAD_DIRS=/app/src
      - RELOAD_INCLUDES=*.py,*.yaml,*.yml,*.json
      - RELOAD_EXCLUDES=__pycache__,*.pyc,*.pyo,*.pyd,.git,*.log
      - UVICORN_RELOAD=true
      - UVICORN_RELOAD_DELAY=0.5  # Reduced from 1
      
      # Database configurations - optimized connection settings
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-multimodal_librarian}
      - POSTGRES_USER=${POSTGRES_USER:-ml_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ml_password}
      - POSTGRES_MAX_CONNECTIONS=${POSTGRES_MAX_CONNECTIONS:-50}  # Reduced from 100
      - POSTGRES_POOL_SIZE=${POSTGRES_POOL_SIZE:-5}  # Reduced from 10
      
      - NEO4J_HOST=${NEO4J_HOST:-neo4j}
      - NEO4J_PORT=${NEO4J_PORT:-7687}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-ml_password}
      
      - MILVUS_HOST=${MILVUS_HOST:-milvus}
      - MILVUS_PORT=${MILVUS_PORT:-19530}
      - MILVUS_COLLECTION_NAME=${MILVUS_COLLECTION_NAME:-knowledge_chunks}
      
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - CACHE_TTL=${CACHE_TTL:-1800}  # Reduced from 3600
      
      # Security settings
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-bG9jYWwtZGV2LWVuY3J5cHRpb24ta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-100}
      - WEBSOCKET_TIMEOUT=${WEBSOCKET_TIMEOUT:-300}
      
      # External APIs
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # File storage
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - MEDIA_DIR=${MEDIA_DIR:-/app/media}
      - EXPORT_DIR=${EXPORT_DIR:-/app/exports}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      
      # Processing settings - optimized for development
      - CHUNK_SIZE=${CHUNK_SIZE:-256}  # Reduced from 512
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-25}  # Reduced from 50
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      
      # Feature flags
      - ENABLE_DOCUMENT_UPLOAD=${ENABLE_DOCUMENT_UPLOAD:-true}
      - ENABLE_KNOWLEDGE_GRAPH=${ENABLE_KNOWLEDGE_GRAPH:-true}
      - ENABLE_VECTOR_SEARCH=${ENABLE_VECTOR_SEARCH:-true}
      - ENABLE_AI_CHAT=${ENABLE_AI_CHAT:-true}
    volumes:
      # Essential mounts only for faster startup
      - ./src:/app/src:rw
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./.env.local:/app/.env.local:ro
      - ./uploads:/app/uploads:rw
      - ./media:/app/media:rw
      - ./exports:/app/exports:rw
      - ./logs:/app/logs:rw
      # Cache volumes for faster rebuilds
      - ml_model_cache:/app/.cache
      - python_cache:/root/.cache/pip
    depends_on:
      # Optimized dependency chain - only essential services
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      # Neo4j and Milvus can start in parallel after basic services
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/simple', timeout=3).read()\""]
      interval: 15s  # Reduced from 30s
      timeout: 5s   # Reduced from 10s
      retries: 2    # Reduced from 3
      start_period: 30s  # Reduced from 60s

  # =============================================================================
  # POSTGRESQL DATABASE - Optimized for fast startup
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M  # Reduced from 1G
        reservations:
          cpus: '0.25'
          memory: 192M  # Reduced from 256M
      restart_policy:
        condition: on-failure
        delay: 3s  # Reduced from 5s
        max_attempts: 3  # Reduced from 5
        window: 60s  # Reduced from 120s
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-multimodal_librarian}
      - POSTGRES_USER=${POSTGRES_USER:-ml_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ml_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      # Optimized settings for development startup
      - POSTGRES_SHARED_PRELOAD_LIBRARIES=
      - POSTGRES_MAX_CONNECTIONS=${POSTGRES_MAX_CONNECTIONS:-50}  # Reduced from 100
      - POSTGRES_SHARED_BUFFERS=128MB  # Reduced from 256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=512MB  # Reduced from 1GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Essential initialization scripts only
      - ./database/postgresql/init/01_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql:ro
      - ./database/postgresql/init/06_application_schema.sql:/docker-entrypoint-initdb.d/06_application_schema.sql:ro
      - ./database/postgresql/health_check.sql:/etc/postgresql/health_check.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ml_user -d multimodal_librarian"]
      interval: 10s  # Reduced from 30s
      timeout: 5s    # Reduced from 15s
      retries: 3     # Reduced from 5
      start_period: 20s  # Reduced from 60s
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=2.0
      -c checkpoint_timeout=5min
      -c max_wal_size=1GB
      -c min_wal_size=256MB
      -c log_statement=none
      -c log_min_duration_statement=-1
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off

  # =============================================================================
  # REDIS CACHE - Optimized for fast startup
  # =============================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M  # Reduced from 512M
        reservations:
          cpus: '0.1'
          memory: 64M   # Reduced from 128M
      restart_policy:
        condition: on-failure
        delay: 2s  # Reduced from 5s
        max_attempts: 3  # Reduced from 5
        window: 30s  # Reduced from 120s
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s   # Reduced from 10s
      timeout: 2s    # Reduced from 5s
      retries: 2     # Reduced from 3
      start_period: 5s

  # =============================================================================
  # NEO4J KNOWLEDGE GRAPH DATABASE - Optimized startup
  # =============================================================================
  neo4j:
    image: neo4j:5.15-community
    deploy:
      resources:
        limits:
          cpus: '1.0'    # Reduced from 1.5
          memory: 1G     # Reduced from 1.5G
        reservations:
          cpus: '0.25'   # Reduced from 0.5
          memory: 256M   # Reduced from 512M
      restart_policy:
        condition: on-failure
        delay: 5s      # Reduced from 10s
        max_attempts: 2  # Reduced from 3
        window: 90s    # Reduced from 180s
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ml_password}
      - NEO4J_PLUGINS=["apoc"]  # Removed GDS for faster startup
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      
      # Optimized memory settings for development
      - NEO4J_server_memory_heap_initial__size=256m  # Reduced from 512m
      - NEO4J_server_memory_heap_max__size=512m      # Reduced from 1G
      - NEO4J_server_memory_pagecache_size=256m      # Reduced from 512m
      - NEO4J_server_memory_off__heap_max__size=128m # Reduced from 256m
      
      # Performance optimizations for startup
      - NEO4J_db_tx__log_rotation_retention__policy=512M size  # Reduced from 1G
      - NEO4J_db_tx__log_rotation_size=50M  # Reduced from 100M
      - NEO4J_dbms_query__cache__size=500   # Reduced from 1000
      - NEO4J_cypher_default__language__version=5
      
      # Connection settings
      - NEO4J_server_bolt_connection__keep__alive=true
      - NEO4J_server_bolt_thread__pool__min__size=2  # Reduced from 5
      - NEO4J_server_bolt_thread__pool__max__size=200 # Reduced from 400
      
      # Checkpoint settings
      - NEO4J_db_checkpoint_interval_time=2m  # Reduced from 5m
      - NEO4J_db_checkpoint_interval_tx=5000  # Reduced from 10000
      
      # Disable expensive operations
      - NEO4J_dbms_usage__report_enabled=false
      - NEO4J_metrics_enabled=false  # Disabled for faster startup
      - NEO4J_dbms_logs_query_enabled=false
      - NEO4J_server_logs_debug_level=WARN  # Reduced logging
      
      # Timeout settings
      - NEO4J_dbms_transaction_timeout=30s  # Reduced from 60s
      - NEO4J_dbms_lock_acquisition_timeout=30s  # Reduced from 60s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ml_password 'RETURN 1 as status'"]
      interval: 15s  # Reduced from 30s
      timeout: 10s   # Reduced from 20s
      retries: 3     # Reduced from 5
      start_period: 45s  # Reduced from 90s

  # =============================================================================
  # MILVUS VECTOR DATABASE - Optimized startup
  # =============================================================================
  milvus:
    image: milvusdb/milvus:v2.3.4
    command: ["milvus", "run", "standalone"]
    deploy:
      resources:
        limits:
          cpus: '1.0'    # Reduced from 1.5
          memory: 1G     # Reduced from 2G
        reservations:
          cpus: '0.25'   # Reduced from 0.5
          memory: 256M   # Reduced from 512M
      restart_policy:
        condition: on-failure
        delay: 5s      # Reduced from 10s
        max_attempts: 2  # Reduced from 3
        window: 90s    # Reduced from 180s
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # Optimized settings for development
      - MILVUS_QUERY_NODE_GRACEFUL_TIME=5  # Reduced from 10
      - MILVUS_QUERY_NODE_STATS_TASK_DELAY_EXECUTE=5  # Reduced from 10
      - MILVUS_QUERY_NODE_LOAD_MEM_USAGE_THRESHOLD=0.7  # Reduced from 0.8
      - MILVUS_QUERY_NODE_CACHE_SIZE=1073741824  # Reduced from 2147483648
      - MILVUS_DATA_NODE_FLUSH_INSERT_BUFFER_SIZE=8388608  # Reduced from 16777216
      - MILVUS_QUERY_NODE_SEARCH_TIMEOUT=15  # Reduced from 30
      - MILVUS_QUERY_NODE_SEARCH_RESULT_TIMEOUT=15  # Reduced from 30
      - MILVUS_INDEX_COORD_GC_INTERVAL=300  # Reduced from 600
      - MILVUS_COMMON_STORAGETYPE=minio
      - MILVUS_COMMON_SECURITY_AUTHORIZATIONENABLED=false
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
        restart: true
      minio:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz"]
      interval: 20s  # Reduced from 30s
      timeout: 10s   # Reduced from 20s
      retries: 2     # Reduced from 3
      start_period: 60s  # Reduced from 90s

  # =============================================================================
  # MILVUS DEPENDENCIES - Optimized
  # =============================================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    deploy:
      resources:
        limits:
          cpus: '0.25'   # Reduced from 0.5
          memory: 256M   # Reduced from 512M
        reservations:
          cpus: '0.05'   # Reduced from 0.1
          memory: 64M    # Reduced from 128M
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=500  # Reduced from 1000
      - ETCD_QUOTA_BACKEND_BYTES=2147483648  # Reduced from 4294967296
      - ETCD_SNAPSHOT_COUNT=25000  # Reduced from 50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "etcdctl endpoint health"]
      interval: 15s  # Reduced from 30s
      timeout: 5s    # Reduced from 15s
      retries: 2     # Reduced from 3
      start_period: 15s  # Reduced from 30s

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    deploy:
      resources:
        limits:
          cpus: '0.25'   # Reduced from 0.5
          memory: 256M   # Reduced from 512M
        reservations:
          cpus: '0.05'   # Reduced from 0.1
          memory: 64M    # Reduced from 128M
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - ml-local-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 15s  # Reduced from 30s
      timeout: 5s    # Reduced from 20s
      retries: 2     # Reduced from 3
      start_period: 10s

# =============================================================================
# VOLUMES - Optimized for faster access
# =============================================================================
volumes:
  # Use tmpfs for frequently accessed data in development
  postgres_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m,uid=999,gid=999
  neo4j_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m,uid=7474,gid=7474
  neo4j_logs:
    driver: local
  milvus_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m
  etcd_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=128m
  minio_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=128m
  redis_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m

  # Cache volumes for faster rebuilds
  ml_model_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./cache/models
  python_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./cache/pip

# =============================================================================
# NETWORKS - Optimized
# =============================================================================
networks:
  ml-local-network:
    name: multimodal-librarian-local-optimized
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1
    driver_opts:
      com.docker.network.bridge.name: ml-opt-br0
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: 1500